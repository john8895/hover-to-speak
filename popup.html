<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, system-ui, sans-serif; padding: 12px; width: 260px; margin: 0; }
  h1 { font-size: 13px; margin: 0 0 12px; }
  label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
  select, button { width: 100%; font-size: 13px; padding: 6px; box-sizing: border-box; }
  button { margin-top: 8px; cursor: pointer; }
  .row { margin-bottom: 10px; }

  .power-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 14px;
  }
  #login-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, box-shadow 0.15s;
    padding: 0;
  }
  #login-btn.state-off {
    background: #d1d5db;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  #login-btn.state-off:hover { background: #9ca3af; }
  #login-btn.state-on {
    background: #16a34a;
    box-shadow: 0 0 0 4px #bbf7d0, 0 2px 8px rgba(22,163,74,0.4);
  }
  #login-btn.state-on:hover { background: #15803d; }

  #settings { display: none; }
  #settings.visible { display: block; }
</style>
</head>
<body>
  <h1>Hover to Speak</h1>

  <div class="power-wrap">
    <button id="login-btn" class="state-off" title="開啟 / 關閉">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- power arc -->
        <path d="M12 8.8A12 12 0 1 0 24 8.8" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
        <!-- vertical stem -->
        <line x1="18" y1="4" x2="18" y2="18" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div id="settings">
    <div class="row">
      <label for="voice">Voice (English only)</label>
      <select id="voice"></select>
    </div>
    <button id="test">Test voice</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
